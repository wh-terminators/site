<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Terminator Deals — Hot Deals</title>

  <meta name="description" content="Browse liquidation deals in Toronto. Electronics, appliances, tools and Amazon return items at warehouse prices. Pickup in North York or delivery available." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://terminatordeals.ca/products.html" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --muted:#5a6472;
      --text:#0f1420;
      --brand:#16a34a;
      --brand-2:#1d4ed8;
      --chip:#e8edf4;
      --error:#ef4444;
      --ring: rgba(29,78,216,.25);
    }

    *{box-sizing:border-box} html,body{height:100%}
    body{
      margin:0;
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{max-width:1200px;margin:24px auto;padding:0 16px}
  .bar{
  display:flex;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
  position:sticky;
  top:0;
  z-index:50;
  background:rgba(246,247,251,.96);
  backdrop-filter:blur(8px);
  padding:10px 0;
  border-bottom:1px solid #dbe3ee;
}
    .badge{
      font-size:12px;
      padding:4px 8px;
      border-radius:999px;
      background:#eef3f9;
      border:1px solid #cfd8e3;
      color:#516072;
    }

    .title{display:flex;align-items:center;gap:10px;font-weight:800}
    .title .dot{
      width:36px;
      height:36px;
      border-radius:50%;
      background:#dcfce7;
      display:grid;
      place-items:center;
      border:1px solid #bbf7d0;
    }

    .controls{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    .input, select{
      height:40px;
      border:1px solid #cfd8e3;
      background:#ffffff;
      color:var(--text);
      border-radius:10px;
      padding:0 12px;
      outline:none;
      transition:.2s;
      width:100%;
    }

    .input:focus, select:focus{
      border-color:#7aa2e3;
      box-shadow:0 0 0 4px var(--ring)
    }

    .controls > *{flex:1 1 220px}

    .toggle{
      display:flex;
      align-items:center;
      gap:8px;
      min-height:40px;
    }

    .toggle input{width:18px;height:18px}
    .rightControls{margin-left:auto;display:flex;gap:10px;flex-wrap:wrap}

    #grid{
      display:grid;
      gap:12px;
      margin-top:16px;
      grid-template-columns:repeat(2, minmax(0, 1fr));
    }

    @media (min-width:768px){
      #grid{
        grid-template-columns:repeat(3, minmax(0, 1fr));
      }
    }

    @media (min-width:1024px){
      #grid{
        grid-template-columns:repeat(4, minmax(0, 1fr));
      }
    }

    .card{
      background:var(--card);
      border:1px solid #d6deea;
      border-radius:16px;
      overflow:hidden;
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    }

    .card:hover{
      transform:translateY(-4px);
      box-shadow:0 10px 24px rgba(15,20,32,.08);
      border-color:#b8c7da;
    }

    .thumb{
      position:relative;
      aspect-ratio:4/3;
      background:#eef2f7;
      overflow:hidden
    }

    .thumb img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block
    }

    .chip{
      position:absolute;
      top:8px;
      left:8px;
      background:#eef3f9;
      color:#718096;
      border:1px solid #cbd5e1;
      border-radius:999px;
      font-size:12px;
      padding:3px 8px
    }

    .body{padding:12px 12px 14px}

    .name{
      font-weight:700;
      line-height:1.2;
      margin:0 0 4px;
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
      overflow:hidden;
      min-height:2.4em;
    }

    .priceRow{
      display:flex;
      align-items:baseline;
      gap:8px;
      font-weight:700
    }

    .old{
      color:#7b8797;
      text-decoration:line-through;
      font-weight:600
    }

    .meta{
      display:flex;
      align-items:center;
      gap:8px;
      margin:8px 0;
      color:#7a8796;
      font-size:12px
    }

    .meta .dot{
      width:6px;
      height:6px;
      border-radius:50%;
      background:#22c55e;
      box-shadow:0 0 0 3px rgba(34,197,94,.12)
    }

    .details{
      color:#8a96a8;
      font-size:13px;
      line-height:1.3;
      margin:8px 0 10px
    }

    .details.collapsed{
      display:-webkit-box;
      -webkit-line-clamp:1;
      -webkit-box-orient:vertical;
      overflow:hidden
    }

    .shipping-badge{
      display:inline-block;
      margin:6px 0 2px;
      padding:4px 8px;
      font-size:11px;
      font-weight:700;
      border-radius:8px;
      background:#dcfce7;
      color:#166534;
      border:1px solid #bbf7d0;
    }

    .btns{
      display:flex;
      gap:10px;
      flex-wrap:wrap
    }

    .btn{
      flex:1 1 130px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      height:40px;
      border-radius:12px;
      border:1px solid #cfd8e3;
      background:#eef3f9;
      color:#0f172a;
      font-weight:700;
      text-decoration:none;
      transition:.18s;
      cursor:pointer;
    }

    .btn:hover{
      transform:translateY(-2px);
      box-shadow:0 8px 20px rgba(0,0,0,.08);
      border-color:#9fb3cc;
    }

    .btn.gray{
      background:#e8eef6;
      border-color:#c9d4e2;
      color:#0f172a;
    }

    .btn.green{
      background:linear-gradient(180deg,#22c55e,#16a34a);
      border-color:#159947;
      color:#fff;
    }

    .btn.blue{
      background:linear-gradient(180deg,#3b82f6,#2563eb);
      border-color:#2557d6;
      color:#fff;
    }

    .cart-link{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:90px;
      height:40px;
      padding:0 14px;
      border-radius:10px;
      border:1px solid #c9d4e2;
      background:#e8eef6;
      color:#0f172a;
      font-weight:700;
      text-decoration:none;
    }

    .errorBox{
      background:rgba(239,68,68,.08);
      color:#b91c1c;
      border:1px solid rgba(239,68,68,.25);
      padding:12px;
      border-radius:12px
    }

    .hidden{display:none}
    .foot{color:#7b8797;font-size:12px;margin:14px 0}
    .ok{color:#2563eb}

    @media (max-width:767px){
      .wrap{margin:14px auto;padding:0 10px}

      .controls{
        gap:8px;
      }

      .controls > *{
        flex:1 1 100%;
      }

      .rightControls{
        margin-left:0;
        width:100%;
      }

      .card{
        border-radius:14px;
      }

      .body{
        padding:10px;
      }

      .thumb{
        aspect-ratio:1/1;
      }

      .chip{
        font-size:11px;
        padding:2px 7px;
        top:6px;
        left:6px;
      }

      .name{
        font-size:14px;
        line-height:1.2;
        min-height:2.4em;
      }

      .priceRow{
        gap:6px;
        font-size:15px;
      }

      .old{
        font-size:13px;
      }

      .meta{
        gap:6px;
        margin:6px 0;
        font-size:11px;
      }

      .details{
        display:none;
      }

      .btns{
        gap:6px;
      }

      .btn{
        flex:1 1 100%;
        height:34px;
        border-radius:10px;
        font-size:12px;
        padding:0 8px;
      }

      .shipping-badge{
        font-size:10px;
        padding:3px 6px;
      }
    }
  </style>
</head>

<body>
  <h1 style="position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden;">Liquidation Deals in Toronto — Warehouse Terminators</h1>

  <div class="wrap">
    <div class="bar">
      <div class="title">
        <span class="dot">WT</span>
        <div>Terminator Deals — <span style="opacity:.85">Hot Deals</span></div>
      </div>
      <span id="status" class="badge">Live from Google Sheets</span>
      <span id="loadmark" class="badge hidden ok">loaded</span>
      <div class="rightControls">
        <a href="/cart.html" class="cart-link">Cart<span id="cartCountWrap" style="display:none;"> (<span id="cartCount">0</span>)</span></a>
      </div>
    </div>

    <div class="controls">
      <input id="q" class="input" placeholder="Search by title, details, category…" />
      <select id="cat"><option value="*">All categories</option></select>

      <select id="sort">
        <option value="default">Sort: Default</option>
        <option value="price_asc">Price: Low to High</option>
        <option value="price_desc">Price: High to Low</option>
      </select>

      <div class="toggle">
        <input id="stock" type="checkbox" checked>
        <label for="stock">In stock only</label>
      </div>
    </div>

    <div id="error" class="errorBox hidden"></div>
    <section id="grid"></section>
    <div id="empty" class="foot hidden">Nothing found.</div>
  </div>

<script>
/* ====== CONFIG ====== */
const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRXCtr0EyBGmVEwq7s8aADwD_B37OUu1QWTsKU5jrqulvAidhNWJrMzjOFZ2skbC9bkgWjW77uKosNC/pub?gid=0&single=true&output=csv";
const WHATSAPP = "13653784497";
const CART_KEY = "wt_cart";

document.documentElement.setAttribute('data-theme', 'light');
localStorage.setItem('theme', 'light');

const STATUS = document.getElementById('status');
const ERRBOX = document.getElementById('error');
const LOADED = document.getElementById('loadmark');
const grid = document.getElementById('grid');

const money = n => `$${Number(n || 0).toLocaleString()}`;
const slug = s => String(s || '')
  .toLowerCase()
  .trim()
  .replace(/[^\p{L}\p{N}]+/ug, '-')
  .replace(/^-+|-+$/g, '')
  .slice(0, 120);

function getCart(){
  try{
    return JSON.parse(localStorage.getItem(CART_KEY) || "[]");
  }catch{
    return [];
  }
}

function saveCart(cart){
  localStorage.setItem(CART_KEY, JSON.stringify(cart));
}

function updateCartCount(){
  try{
    const cart = JSON.parse(localStorage.getItem(CART_KEY) || "[]");
    const total = cart.reduce((sum, item) => sum + Number(item.qty || 1), 0);
    const countEl = document.getElementById("cartCount");
    const wrapEl = document.getElementById("cartCountWrap");
    if(countEl) countEl.textContent = total;
    if(wrapEl) wrapEl.style.display = total > 0 ? "inline" : "none";
  }catch{}
}

function addToCart(item){
  const cart = getCart();
  const existing = cart.find(x => x.id === item.id);

  if(existing){
    existing.qty = Number(existing.qty || 1) + 1;
  } else {
    cart.push({
      id: item.id,
      title: item.title,
      price_now: item.price_now,
      image: item.image,
      condition: item.condition || "",
      shipping_canada: !!item.shipping_canada,
      qty: 1
    });
  }

  saveCart(cart);
  updateCartCount();
  alert("Added to cart");
}

function addItemById(id){
  const item = ITEMS.find(x => x.id === id);
  if(!item) return;
  addToCart(item);
}

function csvToObjects(text){
  const rows = [];
  let i = 0, cur = '', row = [], inQ = false;

  while(i < text.length){
    const c = text[i];
    if(c === '"'){
      if(inQ && text[i+1] === '"'){ cur += '"'; i++; }
      else inQ = !inQ;
    } else if(c === ',' && !inQ){
      row.push(cur);
      cur = '';
    } else if((c === '\n' || c === '\r') && !inQ){
      if(cur !== '' || row.length){
        row.push(cur);
        rows.push(row);
        row = [];
        cur = '';
      }
    } else {
      cur += c;
    }
    i++;
  }

  if(cur !== '' || row.length){
    row.push(cur);
    rows.push(row);
  }

  const head = (rows.shift() || []).map(h => String(h || '').trim());

  return rows
    .filter(r => r.some(x => String(x || '').trim() !== ''))
    .map(r => {
      const obj = {};
      head.forEach((h, idx) => obj[h] = (r[idx] || '').trim());
      return obj;
    });
}

async function loadSheet(){
  const r = await fetch(SHEET_CSV_URL, { cache: "no-store" });
  if(!r.ok) throw new Error(`HTTP ${r.status}`);
  return csvToObjects(await r.text());
}

const qIn = document.getElementById('q');
const catIn = document.getElementById('cat');
const stockIn = document.getElementById('stock');
const sortIn = document.getElementById('sort');

const FILTER = { q:'', cat:'*', stock:true, sort:'default' };
let ITEMS = [];

function cardHTML(item){
  const id = item.id;
  const detailsSafe = (item.details || '').replace(/\s+/g, ' ').trim();
  const productUrl = `https://terminatordeals.ca/product.html?id=${encodeURIComponent(id)}`;

  const wa = `https://wa.me/${WHATSAPP}?text=` +
    encodeURIComponent(
`Hi! I'm interested in ${item.title}

Price: ${money(item.price_now)}
${item.condition ? `Condition: ${item.condition}` : ''}
${item.shipping_canada ? `Shipping: Available across Canada` : ''}

${productUrl}`
    );

  const imgSrc = item.image && /^https?:\/\//i.test(item.image)
    ? item.image
    : 'assets/placeholder.webp';

  return `
  <article class="card">
    <a href="${productUrl}" style="text-decoration:none;color:inherit">
      <div class="thumb">
        <img src="${imgSrc}" alt="${item.title}" loading="lazy" onerror="this.src='assets/placeholder.webp'">
        <span class="chip">${item.category || 'Item'}</span>
      </div>
    </a>

    <div class="body">
      <a href="${productUrl}" style="text-decoration:none;color:inherit"><h3 class="name">${item.title}</h3></a>

      <div class="priceRow">
        <span>${money(item.price_now)}</span>
        ${item.price_old ? `<span class="old">${money(item.price_old)}</span>` : ''}
      </div>

      <div class="meta">
        <span class="dot" style="background:${item.in_stock ? '#22c55e' : '#ef4444'}"></span>
        ${item.in_stock ? 'In stock' : 'Out of stock'}
      </div>

      ${item.condition ? `<div class="meta">Condition: ${item.condition}</div>` : ''}
      ${item.shipping_canada ? `<div class="shipping-badge">🇨🇦 Ships across Canada</div>` : ''}

      <div class="details collapsed">${detailsSafe}</div>

      <div class="btns">
        <a class="btn gray" href="${productUrl}">View details</a>
        <button class="btn gray" onclick="addItemById('${item.id}')">Add to cart</button>
        <a class="btn green" href="${wa}" target="_blank" rel="noopener">WhatsApp</a>
        ${item.amazon_url ? `<a class="btn blue" href="${item.amazon_url}" target="_blank" rel="noopener nofollow">Compare price</a>` : ''}
      </div>
    </div>
  </article>`;
}

function render(){
  const q = (FILTER.q || '').toLowerCase();

  const list = ITEMS.filter(it => {
    if(FILTER.stock && !it.in_stock) return false;
    if(FILTER.cat !== '*' && it.category !== FILTER.cat) return false;

    if(q){
      const hay = `${it.title} ${it.details} ${it.category} ${it.condition}`.toLowerCase();
      if(!hay.includes(q)) return false;
    }

    return true;
  });

  if(FILTER.sort === 'price_asc'){
    list.sort((a, b) => Number(a.price_now || 0) - Number(b.price_now || 0));
  } else if(FILTER.sort === 'price_desc'){
    list.sort((a, b) => Number(b.price_now || 0) - Number(a.price_now || 0));
  }

  grid.innerHTML = list.map(cardHTML).join('');
  document.getElementById('empty').classList.toggle('hidden', list.length !== 0);
}

(async()=>{
  try{
    const rows = await loadSheet();

    ITEMS = rows.map(r => {
      const id = slug(r.id || r.title);
      return {
        id,
        title: r.title || 'Untitled',
        price_now: Number(r.price_now || 0),
        price_old: r.price_old ? Number(r.price_old) : '',
        category: r.category || 'Other',
        image: r.image || 'assets/placeholder.webp',
        details: r.details || '',
        condition: r.condition || r.Condition || '',
        shipping_canada: String(r.shipping_canada || '').toLowerCase() === 'yes',
        amazon_url: r.amazon_url || '',
        in_stock: String(r.in_stock || 'yes').toLowerCase().startsWith('y')
      };
    });

    const cats = Array.from(new Set(ITEMS.map(x => x.category).filter(Boolean))).sort();
    catIn.innerHTML = `<option value="*">All categories</option>` +
      cats.map(c => `<option value="${c}">${c}</option>`).join('');

    LOADED.classList.remove('hidden');
    updateCartCount();
    render();
  }catch(e){
    ERRBOX.classList.remove('hidden');
    ERRBOX.textContent = `Failed to load Google Sheet. Details: ${e.message || String(e)}\n\nFix: Google Sheets → File → Publish to the web (recommended) OR check Sheet name & sharing.`;
    console.error(e);
  }
})();

const params = new URLSearchParams(window.location.search);
const searchFromUrl = params.get('s');

if(searchFromUrl){
  FILTER.q = searchFromUrl;
  qIn.value = searchFromUrl;
}

qIn.oninput = e => {
  FILTER.q = e.target.value;
  render();
};

catIn.onchange = e => {
  FILTER.cat = e.target.value;
  render();
};

stockIn.onchange = e => {
  FILTER.stock = e.target.checked;
  render();
};

sortIn.onchange = e => {
  FILTER.sort = e.target.value;
  render();
};
</script>
</body>
</html>
