<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Product • Terminator Deals</title>

<meta name="robots" content="index, follow" />
<meta name="description" content="Product details and price at Terminator Deals in Toronto." />
<link rel="canonical" href="https://terminatordeals.ca/product.html" />

<style>
:root{
--bg:#0f1218;
--card:#161b22;
--text:#e9eef5;
--muted:#9fb0c3;
--brand:#16c172;
--chip:#263040;
--chipText:#9fb0c3;
--shadow:0 8px 28px rgba(0,0,0,.35)
}

[data-theme="light"]{
--bg:#f6f8fb;
--card:#fff;
--text:#0b1220;
--muted:#4b5b70;
--brand:#0aa46a;
--chip:#e9eef6;
--chipText:#42536a;
--shadow:0 8px 28px rgba(10,20,40,.12)
}

*{box-sizing:border-box}

body{
margin:0;
background:var(--bg);
color:var(--text);
font:16px/1.5 system-ui,Inter,Arial
}

.wrap{
max-width:980px;
margin:24px auto;
padding:0 16px
}

header{
display:flex;
align-items:center;
gap:10px;
margin-bottom:18px;
flex-wrap:wrap
}

.logo{
width:28px;
height:28px;
border-radius:8px;
background:#24d27e;
color:#0c1a12;
display:grid;
place-items:center;
font-weight:800
}

.btn{
background:var(--card);
border:1px solid rgba(120,140,160,.25);
color:var(--text);
border-radius:10px;
padding:10px 12px;
cursor:pointer;
text-decoration:none;
display:inline-flex;
align-items:center;
justify-content:center;
font-weight:700
}

.btn.primary{
background:var(--brand);
border:none;
color:#072116;
font-weight:700
}

.btn.secondary{
background:var(--chip);
color:var(--chipText);
border:none
}

.grid{
display:grid;
gap:24px
}

@media (min-width:900px){
.grid{
grid-template-columns:1fr 1fr
}
}

.img{
width:100%;
aspect-ratio:4/3;
object-fit:cover;
border-radius:14px;
box-shadow:var(--shadow);
background:#0b0f14
}

.price{
display:flex;
align-items:baseline;
gap:12px;
font-size:20px
}

.now{
color:#00d084;
font-weight:800
}

.old{
color:var(--muted);
text-decoration:line-through
}

.muted{
color:var(--muted)
}

.error{
background:#331f1f;
border:1px solid #cc6666;
color:#ffd7d7;
border-radius:10px;
padding:10px 12px;
margin:12px 0;
white-space:pre-wrap
}

.shipping-box{
background:#121923;
border:1px solid rgba(120,140,160,.2);
border-radius:12px;
padding:12px;
margin:16px 0;
font-size:14px;
line-height:1.5
}

.actions{
display:flex;
gap:10px;
flex-wrap:wrap
}

/* MOBILE IMPROVEMENTS */

@media (max-width:768px){

.wrap{
padding:0 12px
}

.grid{
gap:16px
}

.img{
aspect-ratio:1/1
}

h1{
font-size:22px;
line-height:1.25;
margin-top:12px;

display:-webkit-box;
-webkit-line-clamp:3;
-webkit-box-orient:vertical;
overflow:hidden
}

.price{
font-size:18px
}

.muted{
font-size:14px
}

.btn{
height:42px;
font-size:14px;
border-radius:12px
}

.actions .btn{
width:100%
}

}
</style>
</head>

<body>

<div class="wrap">

<header>
<div class="logo">WT</div>
<a href="products.html" class="btn">← Back to catalog</a>
<a href="/cart.html" class="btn">Cart</a>
<button id="theme" class="btn" style="margin-left:auto">Theme</button>
</header>

<div id="err" class="error" style="display:none"></div>
<div id="content" class="grid"></div>

</div>

<script>
/* CONFIG */
const SHEET_ID = "1KzTz3QsWVZeVuxtE7Jw0uAqMBvvdQHT_Wuuv1zeWZk";
const GID = "0";
const SHEET_NAME = "Catalog";
const WHATSAPP = "13653784497";
const CART_KEY = "wt_cart";

/* THEME */
const applyTheme = t => {
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('theme', t);
};

(() => {
  applyTheme(localStorage.getItem('theme') || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));

  document.getElementById('theme').onclick = () => {
    applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
  };
})();

/* CART */
function getCart(){
  try{
    return JSON.parse(localStorage.getItem(CART_KEY) || "[]");
  }catch{
    return [];
  }
}

function saveCart(cart){
  localStorage.setItem(CART_KEY, JSON.stringify(cart));
}

function addToCart(item){
  const cart = getCart();
  const existing = cart.find(x => x.id === item.id);

  if(existing){
    existing.qty = Number(existing.qty || 1) + 1;
  } else {
    cart.push({
      id: item.id,
      title: item.title,
      price_now: item.price_now,
      image: item.image,
      condition: item.condition || "",
      shipping_canada: !!item.shipping_canada,
      qty: 1
    });
  }

  saveCart(cart);
  alert("Added to cart");
}

/* HELPERS */
function slug(s){
  return String(s || '')
    .toLowerCase()
    .trim()
    .replace(/[^\p{L}\p{N}]+/ug,'-')
    .replace(/(^-|-$)/g,'')
    .slice(0,120);
}

function money(n){
  return '$' + Number(n || 0).toLocaleString();
}

function parseCSV(text){
  const rows = [];
  let i = 0, cur = '', row = [], inQ = false;

  while(i < text.length){
    const c = text[i];

    if(c === '"'){
      if(inQ && text[i+1] === '"'){ cur += '"'; i++; }
      else inQ = !inQ;
    }
    else if(c === ',' && !inQ){
      row.push(cur);
      cur = '';
    }
    else if((c === '\n' || c === '\r') && !inQ){
      if(cur !== '' || row.length){
        row.push(cur);
        rows.push(row);
        row = [];
        cur = '';
      }
    }
    else cur += c;

    i++;
  }

  if(cur !== '' || row.length){
    row.push(cur);
    rows.push(row);
  }

  const head = (rows.shift() || []).map(h => String(h || '').trim());

  return rows
    .filter(r => r.some(x => String(x || '').trim() !== ''))
    .map(r => {
      const obj = {};
      head.forEach((h, idx) => obj[h] = (r[idx] || '').trim());
      return obj;
    });
}

const PUBLISHED_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRXCtr0EyBGmVEwq7s8aADwD_B37OUu1QWTsKU5jrqulvAidhNWJrMzjOFZ2skbC9bkgWjW77uKosNC/pub?output=csv&gid=0";

async function loadSheet(){
  const r = await fetch(PUBLISHED_CSV, { cache: "no-store" });
  if(!r.ok) throw new Error(`HTTP ${r.status}`);
  return parseCSV(await r.text());
}

/* SEO */
function setProductSEO(item){
  const base = "https://terminatordeals.ca";
  const url = base + "/product.html?id=" + encodeURIComponent(item.id || "");
  const image = item.image && /^https?:\/\//i.test(item.image)
    ? item.image
    : base + "/assets/placeholder.webp";

  const title = `${item.title || "Product"} – Terminator Deals Toronto`;
  const description = (item.details || item.title || "Liquidation deal in Toronto").slice(0,155);

  document.title = title;

  let meta = document.querySelector('meta[name="description"]');
  if(!meta){
    meta = document.createElement("meta");
    meta.name = "description";
    document.head.appendChild(meta);
  }
  meta.content = description;

  let canonical = document.querySelector('link[rel="canonical"]');
  if(!canonical){
    canonical = document.createElement("link");
    canonical.rel = "canonical";
    document.head.appendChild(canonical);
  }
  canonical.href = url;

  setOrCreateMetaTag("property", "og:title", title);
  setOrCreateMetaTag("property", "og:description", description);
  setOrCreateMetaTag("property", "og:image", image);
  setOrCreateMetaTag("property", "og:url", url);
  setOrCreateMetaTag("property", "og:type", "product");

  setOrCreateMetaTag("name", "twitter:card", "summary_large_image");
  setOrCreateMetaTag("name", "twitter:title", title);
  setOrCreateMetaTag("name", "twitter:description", description);
  setOrCreateMetaTag("name", "twitter:image", image);
}

function setOrCreateMetaTag(attrName, attrValue, content){
  let tag = document.querySelector(`meta[${attrName}="${attrValue}"]`);
  if(!tag){
    tag = document.createElement("meta");
    tag.setAttribute(attrName, attrValue);
    document.head.appendChild(tag);
  }
  tag.setAttribute("content", content);
}
}

(async()=>{

  try{

    const id = new URLSearchParams(location.search).get('id');
    const rows = await loadSheet();

    const items = rows.map(r => ({
      id: slug(r.id || r.title),
      title: r.title || '',
      price_now: Number(r.price_now || 0),
      price_old: r.price_old ? Number(r.price_old) : '',
      category: r.category || '',
      details: r.details || '',
      image: r.image || '',
      amazon_url: r.amazon_url || '',
      in_stock: r.in_stock || '',
      condition: r.condition || r.Condition || '',
      shipping_canada: String(r.shipping_canada || '').toLowerCase() === 'yes'
    }));

    const x = items.find(i => i.id === id);

    if(!x){
      const b = document.getElementById('err');
      b.style.display = 'block';
      b.textContent = 'Product not found.';
      return;
    }

    setProductSEO(x);

    const img = (x.image && /^https?:\/\//i.test(x.image)) ? x.image : 'assets/placeholder.webp';
    const cmp = (x.amazon_url && /^https?:\/\//i.test(x.amazon_url)) ? x.amazon_url : '';

    window.currentProduct = {
      id: x.id,
      title: x.title,
      price_now: x.price_now,
      image: img,
      condition: x.condition || "",
      shipping_canada: !!x.shipping_canada
    };

    const productUrl = `https://terminatordeals.ca/product.html?id=${encodeURIComponent(x.id)}`;

    const wa = `https://wa.me/${WHATSAPP}?text=` + encodeURIComponent(
`Hi! I'm interested in ${x.title}

Price: ${money(x.price_now)}
Category: ${x.category}
${x.condition ? `Condition: ${x.condition}` : ''}
${x.shipping_canada ? `Shipping: Available across Canada` : ''}

${productUrl}`
    );

    document.getElementById('content').innerHTML = `
      <div>
        <img class="img" src="${img}" alt="${x.title}" onerror="this.src='assets/placeholder.webp'">
      </div>

      <div>
        <h1>${x.title}</h1>

        <div class="muted" style="margin-bottom:10px">${x.category || ''}</div>

        <div class="price" style="margin-bottom:12px">
          <span class="now">${money(x.price_now)}</span>
          ${x.price_old ? `<span class="old">${money(x.price_old)}</span>` : ''}
        </div>

        ${x.condition ? `<div class="muted" style="margin-bottom:12px"><strong>Condition:</strong> ${x.condition}</div>` : ''}

        ${x.shipping_canada ? `
        <div class="shipping-box">
          🚚 Shipping across Canada<br>
          📦 Pickup in North York<br>
          ⚡ Same-day GTA delivery
        </div>
        ` : `
        <div class="shipping-box">
          📦 Pickup in North York<br>
          ⚡ Same-day GTA delivery
        </div>
        `}

        <p class="muted" style="margin-bottom:16px">
          ${(x.details || '').replace(/\n/g,'<br>')}
        </p>

        <div class="actions">
          <button class="btn secondary" onclick="addToCart(window.currentProduct)">Add to cart</button>
          <a class="btn primary" href="${wa}" target="_blank" rel="noopener">WhatsApp</a>
          ${cmp ? `<a class="btn secondary" href="${cmp}" target="_blank" rel="noopener nofollow">Compare price</a>` : ''}
          <a class="btn secondary" href="/cart.html">Cart</a>
        </div>
      </div>
    `;

  } catch(e){

    const b = document.getElementById('err');
    b.style.display = 'block';
    b.textContent = `Failed to load product.\n${e.message}`;
    console.error(e);

  }

})();
</script>

</body>
</html>
